name: wallpaper_app
description: A cross-platform wallpaper app that fetches wallpapers from GitHub.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1

  # Image loading & caching
  cached_network_image: ^3.3.1

  # Loading skeleton effect
  shimmer: ^3.0.0

  # Model code generation (runtime support)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Google Fonts
  google_fonts: ^6.2.1

  # Phase 2 — Wallpaper setting
  flutter_wallpaper_manager: ^0.0.4
  image_gallery_saver: ^2.0.3
  path_provider: ^2.1.3

  # Phase 3 — Local favourites storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
